naftiko: 1.0.0-alpha2
info:
  label: CarAPI — Authentication
  description: 'CarAPI — Authentication. 1 operations. Lead operation: Authenticate and Obtain JWT. Self-contained Naftiko
    capability covering one Carapi business surface.'
  tags:
  - Carapi
  - Authentication
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CARAPI_API_KEY: CARAPI_API_KEY
capability:
  consumes:
  - type: http
    namespace: carapi-authentication
    baseUri: https://carapi.app
    description: CarAPI — Authentication business capability. Self-contained, no shared references.
    resources:
    - name: api-auth-login
      path: /api/auth/login
      operations:
      - name: authlogin
        method: POST
        description: Authenticate and Obtain JWT
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.CARAPI_API_KEY}}'
  exposes:
  - type: rest
    namespace: carapi-authentication-rest
    port: 8080
    description: REST adapter for CarAPI — Authentication. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/api/auth/login
      name: api-auth-login
      description: REST surface for api-auth-login.
      operations:
      - method: POST
        name: authlogin
        description: Authenticate and Obtain JWT
        call: carapi-authentication.authlogin
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: carapi-authentication-mcp
    port: 9090
    transport: http
    description: MCP adapter for CarAPI — Authentication. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: authenticate-and-obtain-jwt
      description: Authenticate and Obtain JWT
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: carapi-authentication.authlogin
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
