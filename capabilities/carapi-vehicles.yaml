naftiko: 1.0.0-alpha2
info:
  label: CarAPI — Vehicles
  description: 'CarAPI — Vehicles. 3 operations. Lead operation: List Vehicle Models. Self-contained Naftiko capability covering
    one Carapi business surface.'
  tags:
  - Carapi
  - Vehicles
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CARAPI_API_KEY: CARAPI_API_KEY
capability:
  consumes:
  - type: http
    namespace: carapi-vehicles
    baseUri: https://carapi.app
    description: CarAPI — Vehicles business capability. Self-contained, no shared references.
    resources:
    - name: api-models
      path: /api/models
      operations:
      - name: listmodels
        method: GET
        description: List Vehicle Models
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: limit
          in: query
          type: integer
          description: Maximum number of records to return.
        - name: page
          in: query
          type: integer
          description: Page number for pagination.
    - name: api-trims
      path: /api/trims
      operations:
      - name: listtrims
        method: GET
        description: List Vehicle Trims
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: limit
          in: query
          type: integer
          description: Maximum number of records to return.
        - name: page
          in: query
          type: integer
          description: Page number for pagination.
    - name: api-vehicle-attributes
      path: /api/vehicle-attributes
      operations:
      - name: listvehicleattributes
        method: GET
        description: List Vehicle Attributes
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.CARAPI_API_KEY}}'
  exposes:
  - type: rest
    namespace: carapi-vehicles-rest
    port: 8080
    description: REST adapter for CarAPI — Vehicles. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/api/models
      name: api-models
      description: REST surface for api-models.
      operations:
      - method: GET
        name: listmodels
        description: List Vehicle Models
        call: carapi-vehicles.listmodels
        with:
          limit: rest.limit
          page: rest.page
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/trims
      name: api-trims
      description: REST surface for api-trims.
      operations:
      - method: GET
        name: listtrims
        description: List Vehicle Trims
        call: carapi-vehicles.listtrims
        with:
          limit: rest.limit
          page: rest.page
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/vehicle-attributes
      name: api-vehicle-attributes
      description: REST surface for api-vehicle-attributes.
      operations:
      - method: GET
        name: listvehicleattributes
        description: List Vehicle Attributes
        call: carapi-vehicles.listvehicleattributes
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: carapi-vehicles-mcp
    port: 9090
    transport: http
    description: MCP adapter for CarAPI — Vehicles. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-vehicle-models
      description: List Vehicle Models
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: carapi-vehicles.listmodels
      with:
        limit: tools.limit
        page: tools.page
      outputParameters:
      - type: object
        mapping: $.
    - name: list-vehicle-trims
      description: List Vehicle Trims
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: carapi-vehicles.listtrims
      with:
        limit: tools.limit
        page: tools.page
      outputParameters:
      - type: object
        mapping: $.
    - name: list-vehicle-attributes
      description: List Vehicle Attributes
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: carapi-vehicles.listvehicleattributes
      outputParameters:
      - type: object
        mapping: $.
